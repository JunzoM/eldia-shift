                                            </tr>);
                                        })}
                                        <tr style={{background:'#dbeafe'}}>
                                          <td colSpan={3} style={{padding:'3px 7px',fontWeight:700,color:'#1d4ed8',fontSize:10.5}}>第{wk.no}週計</td>
                                          <td style={{padding:'3px 7px',fontWeight:700,color:'#1d4ed8',textAlign:'right',fontSize:10.5}}>{wk.tot}h</td>
                                          <td style={{padding:'3px 7px'}}></td>
                                          <td colSpan={4} style={{padding:'3px 7px',color:'#475569',fontSize:10,textAlign:'center'}}>通常計（日次OT除く）</td>
                                          <td style={{padding:'3px 7px',fontWeight:700,color:wk.exc>0?'#dc2626':'#16a34a',fontSize:10}}>{wk.exc>0?`↑週次OT +${wk.exc}h`:'週40h以内 ✓'}</td>
                                        </tr>
                                        {wk.exc>0&&(
                                          <tr style={{background:'#fee2e2'}}>
                                            <td colSpan={3} style={{padding:'2px 7px',color:'#b91c1c',fontSize:9.5,fontStyle:'italic'}}>→ 週次OT調整</td>
                                            <td style={{padding:'2px 7px'}}></td>
                                            <td style={{padding:'2px 7px'}}></td>
                                            <td style={{padding:'2px 7px',textAlign:'right',color:'#b91c1c',fontSize:9.5}}>{wk.wOTDH>0?`−${wk.wOTDH}h`:''}</td>
                                            <td style={{padding:'2px 7px',textAlign:'right',color:'#b91c1c',fontSize:9.5}}>{wk.wOTNH>0?`−${wk.wOTNH}h`:''}</td>
                                            <td style={{padding:'2px 7px',textAlign:'right',color:'#dc2626',fontWeight:700,fontSize:9.5}}>{wk.wOTDH>0?`+${wk.wOTDH}h`:''}</td>
                                            <td style={{padding:'2px 7px',textAlign:'right',color:'#dc2626',fontWeight:700,fontSize:9.5}}>{wk.wOTNH>0?`+${wk.wOTNH}h`:''}</td>
                                            <td style={{padding:'2px 7px',color:'#b91c1c',fontSize:9.5}}>法定→OT昇格</td>
                                          </tr>
                                        )}
                                      </React.Fragment>
                                    ))}
                                  </tbody>
                                </table>
                                </div>
                              </details>
                            </td>
                          </tr>
                        );
                      })()}
                      </React.Fragment>
                    ))}
                    <tr style={{background:"#f8faff",fontWeight:700}}>
                      <td colSpan={fixedCols+(salaryOpt60?1:0)} style={{padding:"7px 10px",borderTop:"2px solid #dde3ef",color:"#0f2044",fontSize:12}}>部署合計</td>
                      <td style={{padding:"7px 10px",borderTop:"2px solid #dde3ef",textAlign:"right"}}>
                        <span style={{background:"#0f2044",color:"#c9a84c",padding:"2px 10px",borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:13}}>¥{fmtPay(dGross)}</span>
                      </td>
                      {salaryOptDeduct&&<>
                        <td style={{padding:"7px 10px",borderTop:"2px solid #dde3ef",textAlign:"center",background:"#fef2f2"}}>
                          <span style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,color:"#b91c1c",fontSize:12}}>¥{fmtPay(dSocial)}</span>
                        </td>
                        <td style={{padding:"7px 10px",borderTop:"2px solid #dde3ef",textAlign:"center",background:"#f0fdf4"}}>
                          <span style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,color:"#166534",fontSize:12}}>¥{fmtPay(dIT)}</span>
                        </td>
                        <td style={{padding:"7px 10px",borderTop:"2px solid #dde3ef",textAlign:"right"}}>
                          <span style={{background:"#1e40af",color:"#bfdbfe",padding:"2px 10px",borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:13}}>¥{fmtPay(dNet)}</span>
                        </td>
                      </>}
                    </tr>
                  </tbody>
                </table>
                );
              })()}
            </div>
          );
        })}
          </>}
        </>}

        {/* ── SETTINGS ── */}
        {view==="settings"&&<>
          <div className="sub-tabs">
            <button className={`sub-tab${settingsTab==="staff"?" on":""}`} onClick={()=>setSettingsTab("staff")}>👤 スタッフ</button>
            <button className={`sub-tab${settingsTab==="global"?" on":""}`} onClick={()=>setSettingsTab("global")}>🌐 共通テンプレート</button>
          </div>

          {/* ── Staff settings ── */}
          {settingsTab==="staff"&&<>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
              <span style={{fontSize:13,color:"#64748b"}}>スタッフを選んで個人設定・週間パターンを管理</span>
              <input
                className="inp"
                placeholder="🔍 名前で検索..."
                value={staffSearch}
                onChange={e=>{setStaffSearch(e.target.value);setOpenStaffId(null);}}
                style={{width:160,fontSize:12,padding:"4px 10px"}}
              />
              <button className="btn gold sm" style={{marginLeft:"auto"}} onClick={()=>setAddingStaff(v=>!v)}>＋ スタッフ追加</button>
            </div>
            {addingStaff&&(
              <div className="form-row" style={{marginBottom:14}}>
                <input className="inp" placeholder="氏名 *" value={newStaff.name} onChange={e=>setNewStaff(p=>({...p,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addStaff()} autoFocus style={{width:130}}/>
                <select value={newStaff.deptId} onChange={e=>setNewStaff(p=>({...p,deptId:e.target.value}))} style={{...SEL,fontSize:13,padding:"5px 10px"}}>{depts.map(d=><option key={d.id} value={d.id}>{d.label}</option>)}</select>
                <button className="btn gold" onClick={addStaff}>追加</button>
                <button className="btn sec" onClick={()=>setAddingStaff(false)}>キャンセル</button>
              </div>
            )}
            {staffByDept.map(dept=>{
              const deptMembers=[...staff.filter(s=>s.deptId===dept.id)].sort((a,b)=>a.no-b.no)
                .filter(s=>!staffSearch||s.name.includes(staffSearch));
              if(deptMembers.length===0)return null;
              const dc=PALETTE[dept.colorIdx];
              return(
                <div key={dept.id} style={{marginBottom:18}}>
                  <span style={{fontSize:13,fontWeight:700,color:dc.color,background:dc.bg,padding:"3px 12px",borderRadius:8,border:`1px solid ${dc.color}`,display:"inline-block",marginBottom:8}}>{dept.label}</span>
                  {staffSearch&&<span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>{deptMembers.length}件</span>}
                  {deptMembers.map(s=>{
                    const isOpen=openStaffId===s.id;
                    return(
                      <div key={s.id} className="staff-card"
                        draggable
                        onDragStart={()=>{dragStaffId.current=s.id;}}
                        onDragOver={e=>{e.preventDefault();setDragOverId(s.id);}}
                        onDragLeave={()=>setDragOverId(null)}
                        onDrop={()=>handleDrop(s.id)}
                        style={{opacity:dragStaffId.current===s.id?.4:1,
                          outline:dragOverId===s.id?"2px dashed #c9a84c":"none",
                          outlineOffset:2,transition:"outline .1s"}}>
                        <div className={`staff-card-hdr${isOpen?" open":""}`} onClick={()=>setOpenStaffId(isOpen?null:s.id)}>
                          <span style={{fontSize:10,color:isOpen?"rgba(255,255,255,.4)":"#94a3b8",minWidth:16}}>{s.no}</span>
                          <span style={{fontSize:14,fontWeight:700,textDecoration:!s.active?"line-through":"none"}}>{s.name}</span>
                          {!s.active&&<span style={{fontSize:9,color:"#ef4444",background:"#fee2e2",padding:"1px 5px",borderRadius:3}}>退職</span>}
                          {/* Block count */}
                          {s.timeBlocks.length>0&&<span style={{fontSize:9.5,color:isOpen?"rgba(255,255,255,.7)":"#0f766e",background:isOpen?"rgba(255,255,255,.1)":"#ccfbf1",padding:"1px 6px",borderRadius:5}}>⏱ {s.timeBlocks.length}個人</span>}
                          {/* Pattern count */}
                          {s.patterns.length>0&&<span style={{fontSize:9.5,color:isOpen?"rgba(255,255,255,.7)":"#6d28d9",background:isOpen?"rgba(255,255,255,.1)":"#ede9fe",padding:"1px 6px",borderRadius:5}}>📅 {s.patterns.length}パターン</span>}
                          {/* 並び替えボタン */}
                          <div style={{marginLeft:"auto",display:"flex",gap:3,alignItems:"center"}} onClick={e=>e.stopPropagation()}>
                            <span style={{fontSize:14,color:isOpen?"rgba(255,255,255,.5)":"#cbd5e1",cursor:"grab",padding:"0 4px",userSelect:"none"}} title="ドラッグで並び替え">⠿</span>
                            <button onClick={()=>moveStaff(s.id,-1)} style={{background:isOpen?"rgba(255,255,255,.2)":"#e8ecf5",border:"none",borderRadius:4,width:22,height:22,cursor:"pointer",fontSize:12,color:isOpen?"#fff":"#475569",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>↑</button>
                            <button onClick={()=>moveStaff(s.id,1)} style={{background:isOpen?"rgba(255,255,255,.2)":"#e8ecf5",border:"none",borderRadius:4,width:22,height:22,cursor:"pointer",fontSize:12,color:isOpen?"#fff":"#475569",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>↓</button>
                            <span style={{fontSize:11,opacity:.4,marginLeft:4}}>{isOpen?"▲":"▼"}</span>
                          </div>
                        </div>
                        {isOpen&&(
                          <div>
                            {/* Meta */}
                            <div style={{padding:"10px 16px",background:"#f8faff",borderBottom:"1px solid #e2e8f0",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                                <label style={{fontSize:10.5,color:"#64748b",fontWeight:600}}>名前</label>
                                <input value={s.name} onChange={e=>updateStaff(s.id,p=>({...p,name:e.target.value}))}
                                  style={{border:"1.5px solid #dde3ef",borderRadius:6,padding:"5px 10px",fontSize:13,outline:"none",background:"#fff",fontFamily:"'Noto Sans JP',sans-serif",width:130}}/>
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                                <label style={{fontSize:10.5,color:"#64748b",fontWeight:600}}>部署</label>
                                <select value={s.deptId} onChange={e=>updateStaff(s.id,p=>({...p,deptId:e.target.value}))}
                                  style={{...SEL,fontSize:13,padding:"5px 10px"}}>
                                  {depts.map(d=><option key={d.id} value={d.id}>{d.label}</option>)}
                                </select>
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                                <label style={{fontSize:10.5,color:"#64748b",fontWeight:600}}>時給（円）</label>
                                <div style={{display:"flex",alignItems:"center",gap:3}}>
                                  <input type="number" min="0" step="1" value={s.hourlyRate||""} placeholder="1079"
                                    onChange={e=>updateStaff(s.id,p=>({...p,hourlyRate:e.target.value?+e.target.value:0}))}
                                    style={{...SEL,padding:"4px 8px",fontSize:12,width:72}}/>
                                  <span style={{fontSize:10.5,color:"#94a3b8"}}>円/時</span>
                                </div>
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                                <label style={{fontSize:10.5,color:"#64748b",fontWeight:600}}>入社日</label>
                                <input type="date" value={s.joinDate||""} onChange={e=>updateStaff(s.id,p=>({...p,joinDate:e.target.value}))}
                                  style={{...SEL,padding:"4px 8px",fontSize:12}}/>
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                                <label style={{fontSize:10.5,color:"#64748b",fontWeight:600}}>退職日</label>
                                <input type="date" value={s.leaveDate||""} onChange={e=>updateStaff(s.id,p=>({...p,leaveDate:e.target.value,active:!e.target.value}))}
                                  style={{...SEL,padding:"4px 8px",fontSize:12}}/>
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                                <label style={{fontSize:10.5,color:"#64748b",fontWeight:600}}>社会保険 <span style={{fontWeight:400,fontSize:9,color:"#94a3b8"}}>(協会けんぽ大阪)</span></label>
                                <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",marginTop:2}}>
                                  <input type="checkbox" checked={s.hasSocialIns||false}
                                    onChange={e=>updateStaff(s.id,p=>({...p,hasSocialIns:e.target.checked}))}
                                    style={{cursor:"pointer",width:14,height:14}}/>
                                  <span style={{fontSize:12,color:"#334155"}}>健保＋厚年加入 <span style={{fontSize:10,color:"#64748b"}}>(5.145%+9.15%)</span></span>
                                </label>
                                {(s.hasSocialIns||false)&&<label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",marginLeft:4}}>
                                  <input type="checkbox" checked={s.hasKaigo||false}
                                    onChange={e=>updateStaff(s.id,p=>({...p,hasKaigo:e.target.checked}))}
                                    style={{cursor:"pointer",width:14,height:14}}/>
                                  <span style={{fontSize:12,color:"#334155"}}>介護保険対象 <span style={{fontSize:10,color:"#64748b"}}>(0.8%・40〜64歳)</span></span>
                                </label>}
                                <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",marginTop:2}}>
                                  <input type="checkbox" checked={s.hasEmploymentIns!==false}
                                    onChange={e=>updateStaff(s.id,p=>({...p,hasEmploymentIns:e.target.checked}))}
                                    style={{cursor:"pointer",width:14,height:14}}/>
                                  <span style={{fontSize:12,color:"#334155"}}>雇用保険加入 <span style={{fontSize:10,color:"#64748b"}}>(0.6%・週20h以上)</span></span>
                                </label>
                                <span style={{fontSize:9.5,color:"#94a3b8"}}>週20h以上・外国人は除く</span>
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                                <label style={{fontSize:10.5,color:"#64748b",fontWeight:600}}>在職</label>
                                <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",fontSize:12}}>
                                  <input type="checkbox" checked={s.active} onChange={e=>updateStaff(s.id,p=>({...p,active:e.target.checked,leaveDate:e.target.checked?"":p.leaveDate}))} style={{cursor:"pointer"}}/>
                                  在職中
                                </label>
                              </div>
                              <button onClick={()=>{
                                setStaff(p=>{
                                  const filtered = p.filter(x=>x.id!==s.id);
                                  // 同じ部署のスタッフの番号を繰り上げ
                                  const deptId = s.deptId;
                                  let no = 1;
                                  return filtered.map(x=>{
                                    if(x.deptId===deptId){ return {...x, no:no++}; }
                                    return x;
                                  });
                                });
                              }} className="btn danger sm" style={{marginLeft:"auto",alignSelf:"flex-end"}}>削除</button>
                            </div>

                            {/* Section tabs */}
                            <div style={{padding:"10px 16px 0",background:"#fff"}}>
                              <div className="sec-tabs">
                                <button className={`sec-tab${staffSettingSection==="timeblocks"?" on":""}`}
                                  onClick={()=>setStaffSettingSection("timeblocks")}>
                                  ⏱ 個人時間テンプレート {s.timeBlocks.length>0&&<span style={{background:"rgba(255,255,255,.25)",borderRadius:10,padding:"0 5px",fontSize:10}}>{s.timeBlocks.length}</span>}
                                </button>
                                <button className={`sec-tab${staffSettingSection==="patterns"?" on":""}`}
                                  onClick={()=>setStaffSettingSection("patterns")}>
                                  📅 週間パターン {s.patterns.length>0&&<span style={{background:"rgba(255,255,255,.25)",borderRadius:10,padding:"0 5px",fontSize:10}}>{s.patterns.length}</span>}
                                </button>
                                <button className={`sec-tab${staffSettingSection==="periodpatterns"?" on":""}`}
                                  onClick={()=>setStaffSettingSection("periodpatterns")} style={{background:staffSettingSection==="periodpatterns"?"#c9a84c":undefined,color:staffSettingSection==="periodpatterns"?"#0f2044":undefined}}>
                                  🗓 期間限定パターン {(s.periodPatterns||[]).length>0&&<span style={{background:"rgba(255,255,255,.25)",borderRadius:10,padding:"0 5px",fontSize:10}}>{(s.periodPatterns||[]).length}</span>}
                                </button>
                              </div>
                            </div>

                            {staffSettingSection==="timeblocks"&&(
                              <StaffTimeBlockManager s={s} onUpdate={updateStaff}/>
                            )}
                            {staffSettingSection==="patterns"&&(
                              <StaffPatternPanel s={s} globalTemplates={globalTemplates} onUpdate={updateStaff}/>
                            )}
                            {staffSettingSection==="periodpatterns"&&(
                              <PeriodPatternPanel s={s} globalTemplates={globalTemplates} onUpdate={updateStaff}/>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </>}

          {/* ── Global templates ── */}
          {settingsTab==="global"&&(
            <div>
              <GlobalTemplateManager globalTemplates={globalTemplates} setGlobalTemplates={setGlobalTemplates}/>
            </div>
          )}
        </>}
      </div>

      {showPrint&&<PrintModal onClose={()=>setShowPrint(false)} year={year} month={month} monthDates={monthDates} weekDates={weekDates} weekLabel={weekLabel} viewMode={viewMode} staffByDept={staffByDept} summary={summary} globalTemplates={globalTemplates} getEffective={getEffective} findBlock={findBlock}/>}
    </div>
  );
}

    // Mount to DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ShiftApp />);
  </script>
</body>
</html>
